<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Report - WebTester Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #loading { text-align: center; }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid #312e81;
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 18px; font-weight: 700; color: #c7d2fe; margin-bottom: 8px; }
    .sub   { font-size: 13px; color: #4a4a6a; }
    #error-box {
      display: none;
      text-align: center;
      padding: 48px 32px;
      max-width: 480px;
    }
    #error-box .icon  { font-size: 48px; margin-bottom: 16px; }
    #error-box h2     { color: #fca5a5; font-size: 18px; margin-bottom: 12px; }
    #error-box p      { color: #94a3b8; font-size: 14px; line-height: 1.8; }
    #error-box code   { background: #1e1b4b; padding: 2px 8px; border-radius: 4px; font-size: 13px; color: #a5b4fc; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="title">Loading Report...</div>
  <div class="sub">Fetching from backend at localhost:3847</div>
</div>

<div id="error-box">
  <div class="icon">&#9888;&#65039;</div>
  <h2 id="error-title">Could not load report</h2>
  <p id="error-text"></p>
</div>

<script>
var BACKEND = 'http://localhost:3847';

function showError(title, msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-text').innerHTML = msg;
  document.getElementById('error-box').style.display = 'block';
}

// Fetch the latest report HTML directly from backend and write it into this page.
// This is the most reliable approach - no iframe, no blob URL, no storage limits.
fetch(BACKEND + '/latest-report')
  .then(function(res) {
    if (res.status === 404) {
      throw { type: 'no_report' };
    }
    if (!res.ok) {
      throw { type: 'server_error', status: res.status };
    }
    return res.text();
  })
  .then(function(html) {
    if (!html || html.length < 200) {
      throw { type: 'empty' };
    }
    // Write the report HTML directly into this tab - works perfectly in extensions
    document.open('text/html', 'replace');
    document.write(html);
    document.close();
  })
  .catch(function(err) {
    if (err && err.type === 'no_report') {
      showError(
        'No Reports Found',
        'You haven\'t run any tests yet.<br><br>' +
        '1. Click the <code>WebTester Pro</code> extension icon<br>' +
        '2. Enter a URL and click <code>Run Automated Tests</code><br>' +
        '3. Come back here when it finishes'
      );
    } else if (err && err.type === 'server_error') {
      showError(
        'Backend Error',
        'The backend returned an error (status ' + err.status + ').<br><br>' +
        'Try running your test again from the extension popup.'
      );
    } else if (err instanceof TypeError || (err && err.message && err.message.toLowerCase().includes('fetch'))) {
      showError(
        'Backend Not Running',
        'Cannot connect to the backend server.<br><br>' +
        '<strong>Windows:</strong> double-click <code>start-backend.bat</code><br>' +
        '<strong>Mac/Linux:</strong> run <code>bash start-backend.sh</code><br><br>' +
        'Keep that terminal open, then run your test again.'
      );
    } else {
      showError(
        'Unexpected Error',
        'Something went wrong loading the report.<br><br>' +
        (err && err.message ? err.message : JSON.stringify(err)) + '<br><br>' +
        'Try running the test again from the extension popup.'
      );
    }
  });
</script>
</body>
</html>
