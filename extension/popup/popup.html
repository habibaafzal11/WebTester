<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebTester Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 380px; }
    body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e2e8f0; overflow-x: hidden; }
    .header { background: linear-gradient(135deg, #1e1b4b, #3730a3); padding: 16px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #312e81; }
    .logo { font-size: 24px; }
    .header-text h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 11px; color: #a5b4fc; margin-top: 2px; }
    .server-status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
    .dot.ok { background: #10b981; }
    .body { padding: 16px 20px; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    input[type="text"], input[type="url"], input[type="email"], input[type="password"] { width: 100%; padding: 9px 12px; border-radius: 7px; border: 1px solid #2d2d44; background: #16162a; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #4a4a6a; }
    .creds-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #818cf8; cursor: pointer; margin-bottom: 12px; user-select: none; }
    .creds-toggle:hover { color: #a5b4fc; }
    .arrow { transition: transform 0.2s; font-size: 10px; }
    .arrow.open { transform: rotate(90deg); }
    #creds-section { display: none; }
    #creds-section.visible { display: block; }
    #run-btn { width: 100%; padding: 11px; border-radius: 8px; border: none; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    #run-btn:hover { opacity: 0.9; }
    #run-btn:active { transform: scale(0.98); }
    #run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status-area { margin-top: 14px; display: none; }
    .status-msg { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .spinner { width: 14px; height: 14px; border: 2px solid #312e81; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar { height: 4px; background: #1e1b4b; border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); width: 0%; border-radius: 2px; transition: width 0.4s ease; }
    #quick-stats { margin-top: 14px; display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .mini-stat { background: #16162a; border: 1px solid #2d2d44; border-radius: 7px; padding: 8px; text-align: center; }
    .mini-stat .num { font-size: 18px; font-weight: 800; }
    .mini-stat .lbl { font-size: 10px; color: #6b7280; margin-top: 2px; }
    .pass-num { color: #10b981; } .fail-num { color: #ef4444; } .warn-num { color: #f59e0b; } .total-num { color: #818cf8; }
    #view-report-btn { display: none; width: 100%; margin-top: 10px; padding: 9px; border-radius: 7px; border: 1px solid #4f46e5; background: transparent; color: #818cf8; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    #view-report-btn:hover { background: #1e1b4b; }
    .error-box { background: #1f0a0a; border: 1px solid #7f1d1d; border-radius: 7px; padding: 10px 12px; font-size: 12px; color: #fca5a5; margin-top: 12px; display: none; white-space: pre-wrap; line-height: 1.5; }
    .footer { padding: 8px 20px; border-top: 1px solid #1e1b4b; font-size: 10px; color: #4a4a6a; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">&#129514;</div>
  <div class="header-text">
    <h1>WebTester Pro</h1>
    <p>Automated QA + Security Testing</p>
  </div>
  <div class="server-status">
    <div class="dot" id="server-dot"></div>
    <span id="server-label">Checking...</span>
  </div>
</div>
<div class="body">
  <div class="field">
    <label>Target URL</label>
    <input type="url" id="url-input" placeholder="https://example.com" />
  </div>
  <div class="creds-toggle" id="creds-toggle">
    <span class="arrow" id="creds-arrow">&#9658;</span>
    Add Login Credentials (optional)
  </div>
  <div id="creds-section">
    <div class="field">
      <label>Email / Username</label>
      <input type="email" id="email-input" placeholder="user@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="..." />
    </div>
  </div>
  <button id="run-btn">
    <span id="btn-icon">&#9654;</span>
    <span id="btn-text">Run Automated Tests</span>
  </button>
  <div id="status-area">
    <div class="status-msg">
      <div class="spinner"></div>
      <span id="status-text">Initializing...</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="error-box" id="error-box"></div>
  <div id="quick-stats">
    <div class="mini-stat"><div class="num total-num" id="stat-total">-</div><div class="lbl">Total</div></div>
    <div class="mini-stat"><div class="num pass-num" id="stat-pass">-</div><div class="lbl">Passed</div></div>
    <div class="mini-stat"><div class="num fail-num" id="stat-fail">-</div><div class="lbl">Failed</div></div>
    <div class="mini-stat"><div class="num warn-num" id="stat-warn">-</div><div class="lbl">Warnings</div></div>
  </div>
  <button id="view-report-btn">View Full HTML Report</button>
</div>
<div class="footer">
  <span>WebTester Pro v1.0</span>
  <span>Powered by Playwright</span>
</div>
<script src="popup.js"></script>
</body>
</html>
